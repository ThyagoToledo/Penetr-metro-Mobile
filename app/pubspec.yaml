name: penetrometro
description: "Penetrômetro — medição e análise de compactação do solo. IF Goiano."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Estado / DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navegação
  go_router: ^14.2.0

  # Persistência local (SQLite + cripto)
  drift: ^2.18.0
  sqlite3: ^2.4.5
  # sqlcipher_flutter_libs substitui o sqlite3_flutter_libs (fornece a lib
  # nativa COM cifra). Não usar os dois juntos (conflito de namespace).
  sqlcipher_flutter_libs: ^0.6.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # Cloud — Google Drive
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

  # Segurança
  flutter_secure_storage: ^9.2.2
  cryptography: ^2.7.0
  crypto: ^3.0.3

  # Relatórios / exportações
  pdf: ^3.11.0
  excel: ^4.0.6
  csv: ^6.0.0
  archive: ^3.6.1

  # Gráficos
  fl_chart: ^0.68.0

  # Dispositivo
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  share_plus: ^9.0.0
  file_picker: 8.0.7

  # i18n / util
  intl: ^0.20.2
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/

# Ícone do launcher (gera mipmaps + adaptive icon).
# Rode após salvar o PNG:  dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

# Splash screen nativa (inclui Android 12+).
# Rode após salvar o PNG:  dart run flutter_native_splash:create
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#10130F"
  image: assets/icon/app_icon.png
  android_12:
    image: assets/icon/app_icon.png
    color: "#FFFFFF"
    color_dark: "#10130F"
